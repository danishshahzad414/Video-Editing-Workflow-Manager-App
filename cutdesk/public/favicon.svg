<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Scissors: two blades crossing at center -->
  <!-- Top-left circle (pivot) -->
  <circle cx="9" cy="9" r="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Bottom-left circle (pivot) -->
  <circle cx="9" cy="23" r="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Top blade -->
  <line x1="11.1" y1="10.9" x2="26" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom blade -->
  <line x1="11.1" y1="21.1" x2="26" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
